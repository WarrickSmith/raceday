version: "3"
services:
  client:
    build:
      context: ./client
    environment:
      - NODE_ENV=test
    ports:
      - "3001:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
  server:
    build:
      context: ./server
    ports:
      - "5001:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
