openapi: 3.0.0
info:
  title: RaceDay
  version: "1.0"
  description: Endpoints to query TAB data
  contact:
    name: Warrick smith
    email: warrick.smith@developersinstitute.co.nz
servers:
  - url: "https://ws-raceday.herokuapp.com/api"
    description: Production Server
  - url: "http://localhost:5001/api"
    description: Development Server
paths:
  /allraces:
    parameters: []
    get:
      summary: Get User Info by User ID
      operationId: get-users-userId
      description: Retrieve all races for 'today'
      tags:
        - allraces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/allRaces"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /race:
    get:
      summary: ""
      operationId: get-race
      description: Get a single race by passings its URL as a parameter
      tags:
        - race
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/race"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
      parameters:
        - schema:
            type: string
            format: uri
          in: query
          name: url
          description: Single Race URL
          required: true
    parameters: []
  /racemeetings:
    get:
      summary: Your GET endpoint
      tags:
        - racemeetings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/raceMeetings"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
      operationId: get-racemeetings
      description: Get all race meetings for the day
  /allmeetingraces:
    get:
      summary: Your GET endpoint
      tags:
        - allmeetingraces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/allMeetingRaces"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
      operationId: get-allmeetingraces
      description: Get a single race meeting by passings its URL as a parameter
      parameters:
        - schema:
            type: string
            format: uri
          in: query
          name: url
          description: A Single Race Meeting URL
          required: true
    parameters: []
tags:
  - name: allmeetingraces
  - name: allraces
  - name: race
  - name: racemeetings
components:
  schemas:
    error:
      description: Standard Error Response Object
      type: object
      properties:
        message:
          type: string
      x-examples:
        example-1:
          message: string
    allRaces:
      description: All Races Response Object
      type: object
      properties:
        RaceLink:
          type: string
          minLength: 1
        RaceStartTime:
          type: string
          minLength: 1
        RaceNumber:
          type: number
        RaceName:
          type: string
          minLength: 1
        RaceDistance:
          type: number
        RaceStatus:
          type: string
          minLength: 1
        MeetingName:
          type: string
          minLength: 1
        VenueMnemonic:
          type: string
          minLength: 1
        MeetingDate:
          type: string
          minLength: 1
        Location:
          type: string
          minLength: 1
        RaceType:
          type: string
          minLength: 1
      required:
        - RaceLink
        - RaceStartTime
        - RaceNumber
        - RaceName
        - RaceDistance
        - RaceStatus
        - MeetingName
        - VenueMnemonic
        - MeetingDate
        - Location
        - RaceType
      x-examples:
